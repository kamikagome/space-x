name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install DuckDB
        run: |
          curl -fsSL https://github.com/duckdb/duckdb/releases/latest/download/duckdb_cli-linux-amd64.zip -o duckdb.zip
          unzip duckdb.zip
          sudo mv duckdb /usr/local/bin/duckdb

      - name: Fetch SpaceX data
        run: duckdb spacex_modelling.duckdb < fetch_launches.sql

      - name: Build dimensional model
        run: duckdb spacex_modelling.duckdb < create_tables.sql

      - name: Run sanity checks
        run: duckdb spacex_modelling.duckdb < sanity_checks.sql
